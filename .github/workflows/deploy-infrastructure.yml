name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'cloudformation/inventario-sme-stack.yaml'
      - 'glue/scripts/**'
      - '.github/workflows/deploy-infrastructure.yml'
      - '.github/scripts/deploy-stack.sh'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  STACK_NAME: inventario-sme-stack
  TEMPLATE_FILE: cloudformation/inventario-sme-stack.yaml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body "file://${TEMPLATE_FILE}"

      - name: Recover and deploy CloudFormation stack
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          STOCK_BAJO_UMBRAL: ${{ vars.STOCK_BAJO_UMBRAL }}
        run: |
          chmod +x .github/scripts/deploy-stack.sh
          .github/scripts/deploy-stack.sh

      - name: Subir script Glue ETL a S3
        run: |
          GLUE_BUCKET="$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='GlueAssetsBucketName'].OutputValue" \
            --output text)"

          if [ -z "${GLUE_BUCKET}" ] || [ "${GLUE_BUCKET}" = "None" ]; then
            echo "Error: no se encontro output GlueAssetsBucketName"
            exit 1
          fi

          aws s3 cp glue/scripts/carga_inventario_etl.py \
            "s3://${GLUE_BUCKET}/scripts/carga_inventario_etl.py"

          echo "Script Glue publicado en s3://${GLUE_BUCKET}/scripts/carga_inventario_etl.py"

      - name: Publicar outputs del stack
        run: |
          echo "## Outputs del stack ${STACK_NAME}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
            --output table >> "${GITHUB_STEP_SUMMARY}"

          echo ""
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
            --output table
