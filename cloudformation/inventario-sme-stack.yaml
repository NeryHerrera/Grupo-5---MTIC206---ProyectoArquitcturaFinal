AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Grupo 5 - MTIC206 - Sistema Automatizado de Control de Inventario con Vision Artificial.
  Arquitectura Serverless (S3, API Gateway, Lambda, Rekognition, DynamoDB, SNS, IAM, CloudWatch, AWS Glue ETL)
  disenada para operar dentro de los limites del AWS Free Tier.

# -----------------------------------------------------------------------------
# PARAMETROS
# -----------------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: inventario-sme
    Description: Prefijo usado para nombrar los recursos del proyecto.

  AlertEmail:
    Type: String
    Description: Correo electronico del gerente/administrador que recibira las alertas de stock bajo (SNS).

  StockBajoUmbral:
    Type: Number
    Default: 5
    Description: Umbral de unidades por debajo del cual se dispara la alerta de stock bajo (uso de referencia para la logica de Lambda).

# -----------------------------------------------------------------------------
# RECURSOS
# -----------------------------------------------------------------------------
Resources:

  # ---------------------------------------------------------------------------
  # CAPA DE PRESENTACION: S3 (alojamiento web estatico del frontend)
  # ---------------------------------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "inventario-sme-frontend-bucket-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET]
            AllowedHeaders: ["*"]
            MaxAge: 3000
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # ---------------------------------------------------------------------------
  # CAPA DE DATOS: DynamoDB (TablaInventarioPyME)
  # ---------------------------------------------------------------------------
  TablaInventarioPyME:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TablaInventarioPyME
      BillingMode: PAY_PER_REQUEST   # Modelo On-Demand, segun lo indicado en el README
      AttributeDefinitions:
        - AttributeName: productoId
          AttributeType: S
        - AttributeName: categoria
          AttributeType: S
      KeySchema:
        - AttributeName: productoId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CategoriaIndex
          KeySchema:
            - AttributeName: categoria
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  # ---------------------------------------------------------------------------
  # ETL CARGA INICIAL: S3 Staging + AWS Glue (Spark) + EventBridge
  # ---------------------------------------------------------------------------
  StagingCsvBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "inventario-sme-staging-csv-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  GlueAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "inventario-sme-glue-assets-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  InventarioStagingDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: inventario_sme_staging
        Description: Catalogo Glue para CSV de inventario inicial en bucket staging

  InventarioCsvTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref InventarioStagingDatabase
      TableInput:
        Name: inventario_csv
        Description: Tabla externa CSV de inventario PyME
        TableType: EXTERNAL_TABLE
        Parameters:
          skip.header.line.count: "1"
          classification: csv
        StorageDescriptor:
          Columns:
            - Name: productoId
              Type: string
            - Name: nombre
              Type: string
            - Name: categoria
              Type: string
            - Name: cantidad
              Type: int
          Location: !Sub "s3://${StagingCsvBucket}/"
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.apache.hadoop.hive.serde2.OpenCSVSerde
            Parameters:
              separatorChar: ","

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GlueCrawlerRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueCrawlerStagingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt StagingCsvBucket.Arn
                  - !Sub "${StagingCsvBucket.Arn}/*"
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  InventarioCsvCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: InventarioCsvCrawler
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref InventarioStagingDatabase
      Description: Descubre esquema de CSV de inventario en bucket staging
      Targets:
        S3Targets:
          - Path: !Sub "s3://${StagingCsvBucket}/"
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG

  GlueEtlExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GlueEtlExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueEtlCustomPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt StagingCsvBucket.Arn
                  - !Sub "${StagingCsvBucket.Arn}/*"
                  - !GetAtt GlueAssetsBucket.Arn
                  - !Sub "${GlueAssetsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${GlueAssetsBucket.Arn}/temp/*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt TablaInventarioPyME.Arn
                  - !Sub "${TablaInventarioPyME.Arn}/index/*"
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:GetTables
                Resource:
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${InventarioStagingDatabase}"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${InventarioStagingDatabase}/*"
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  LambdaGlueScriptSeedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaGlueScriptSeedRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SeedGlueScriptPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${GlueAssetsBucket.Arn}/scripts/*"
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  GlueScriptSeedFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: GlueScriptSeedFunction
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt LambdaGlueScriptSeedRole.Arn
      Timeout: 60
      MemorySize: 128
      Code:
        ZipFile: |
          const https = require("https");
          const { S3Client, PutObjectCommand } = require("@aws-sdk/client-s3");
          const s3 = new S3Client({});

          const PLACEHOLDER =
            "# Placeholder Glue ETL - GitHub Actions sobrescribe con glue/scripts/carga_inventario_etl.py\n";

          function sendResponse(event, context, status, data, physicalResourceId) {
            const body = JSON.stringify({
              Status: status,
              Reason: `See CloudWatch Log Stream: ${context.logStreamName}`,
              PhysicalResourceId: physicalResourceId || context.logStreamName,
              StackId: event.StackId,
              RequestId: event.RequestId,
              LogicalResourceId: event.LogicalResourceId,
              NoEcho: false,
              Data: data || {},
            });
            const parsed = new URL(event.ResponseURL);
            const options = {
              hostname: parsed.hostname,
              port: 443,
              path: `${parsed.pathname}${parsed.search}`,
              method: "PUT",
              headers: {
                "Content-Type": "",
                "Content-Length": Buffer.byteLength(body),
              },
            };
            return new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                res.on("data", () => {});
                res.on("end", resolve);
              });
              req.on("error", reject);
              req.write(body);
              req.end();
            });
          }

          exports.handler = async (event, context) => {
            const bucket = event.ResourceProperties.Bucket;
            const key = event.ResourceProperties.ScriptKey;
            const physicalId = `glue-script-${bucket}/${key}`;

            try {
              if (event.RequestType === "Delete") {
                await sendResponse(event, context, "SUCCESS", {}, physicalId);
                return;
              }

              await s3.send(
                new PutObjectCommand({
                  Bucket: bucket,
                  Key: key,
                  Body: PLACEHOLDER,
                  ContentType: "text/x-python",
                })
              );

              await sendResponse(event, context, "SUCCESS", { seeded: true }, physicalId);
            } catch (err) {
              console.error(err);
              await sendResponse(event, context, "FAILED", {}, physicalId);
              throw err;
            }
          };

  GlueScriptSeedFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GlueScriptSeedFunction
      Action: lambda:InvokeFunction
      Principal: cloudformation.amazonaws.com

  GlueScriptSeed:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - GlueAssetsBucket
      - GlueScriptSeedFunctionPermission
    Properties:
      ServiceToken: !GetAtt GlueScriptSeedFunction.Arn
      Bucket: !Ref GlueAssetsBucket
      ScriptKey: scripts/carga_inventario_etl.py

  CargaInventarioGlueJob:
    Type: AWS::Glue::Job
    DependsOn: GlueScriptSeed
    Properties:
      Name: CargaInventarioGlueJob
      Role: !GetAtt GlueEtlExecutionRole.Arn
      GlueVersion: "4.0"
      WorkerType: G.1X
      NumberOfWorkers: 2
      Timeout: 10
      Command:
        Name: glueetl
        ScriptLocation: !Sub "s3://${GlueAssetsBucket}/scripts/carga_inventario_etl.py"
        PythonVersion: "3"
      DefaultArguments:
        --job-language: python
        --enable-metrics: "true"
        --enable-glue-datacatalog: "true"
        --TABLE_NAME: !Ref TablaInventarioPyME
        --TempDir: !Sub "s3://${GlueAssetsBucket}/temp/"
        --INPUT_BUCKET: !Ref StagingCsvBucket
        --INPUT_KEY: placeholder.csv
      Description: ETL Spark - carga CSV de inventario inicial hacia DynamoDB

  # EventBridge no acepta el ARN de un Glue Job como target; Lambda inicia el job.
  DispararGlueEtlLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "/aws/lambda/DispararGlueEtlFunction"
      RetentionInDays: 14

  LambdaGlueStarterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaGlueStarterRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartGlueJobAndLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
              - Effect: Allow
                Action: glue:StartJobRun
                Resource: !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:job/CargaInventarioGlueJob"
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  DispararGlueEtlFunction:
    Type: AWS::Lambda::Function
    DependsOn: DispararGlueEtlLogGroup
    Properties:
      FunctionName: DispararGlueEtlFunction
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt LambdaGlueStarterRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          GLUE_JOB_NAME: CargaInventarioGlueJob
      Code:
        ZipFile: |
          const { GlueClient, StartJobRunCommand } = require("@aws-sdk/client-glue");
          const glue = new GlueClient({});

          exports.handler = async (event) => {
            const detail = event.detail || {};
            const bucket = detail.bucket?.name;
            const key = detail.object?.key;

            if (!bucket || !key || !String(key).toLowerCase().endsWith(".csv")) {
              console.log("Evento ignorado (no es CSV en staging)", { bucket, key });
              return { skipped: true };
            }

            const jobName = process.env.GLUE_JOB_NAME;
            const result = await glue.send(
              new StartJobRunCommand({
                JobName: jobName,
                Arguments: {
                  "--INPUT_BUCKET": bucket,
                  "--INPUT_KEY": key,
                },
              })
            );

            console.log("Glue job iniciado", { jobRunId: result.JobRunId, bucket, key });
            return { started: true, jobRunId: result.JobRunId, bucket, key };
          };

  InventarioCsvUploadRule:
    Type: AWS::Events::Rule
    DependsOn: DispararGlueEtlFunction
    Properties:
      Name: InventarioCsvUploadRule
      Description: Dispara Glue ETL al subir un CSV al bucket staging (via Lambda)
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref StagingCsvBucket
          object:
            key:
              - suffix: ".csv"
      State: ENABLED
      Targets:
        - Id: InvokeDispararGlueEtl
          Arn: !GetAtt DispararGlueEtlFunction.Arn

  DispararGlueEtlEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DispararGlueEtlFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt InventarioCsvUploadRule.Arn

  # ---------------------------------------------------------------------------
  # NOTIFICACIONES: SNS (Alertas_StockBajo_Topic)
  # ---------------------------------------------------------------------------
  AlertasStockBajoTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: Alertas_StockBajo_Topic
      DisplayName: Alertas de Stock Bajo - Inventario PyME

  AlertasStockBajoSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertasStockBajoTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # ---------------------------------------------------------------------------
  # SEGURIDAD: IAM Role para Lambda (LambdaInventoryExecutionRole)
  # ---------------------------------------------------------------------------
  LambdaInventoryExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaInventoryExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InventoryLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Logs en CloudWatch
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
              # Rekognition (solo DetectLabels, minimo privilegio)
              - Effect: Allow
                Action:
                  - rekognition:DetectLabels
                Resource: "*"
              # DynamoDB - acceso a la tabla y su GSI
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt TablaInventarioPyME.Arn
                  - !Sub "${TablaInventarioPyME.Arn}/index/*"
              # SNS - publicar alertas
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AlertasStockBajoTopic
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  # ---------------------------------------------------------------------------
  # LOG GROUPS (retencion definida explicitamente para mantenerse en Free Tier)
  # ---------------------------------------------------------------------------
  ProcesarIngresoLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "/aws/lambda/ProcesarIngresoIAFunction"
      RetentionInDays: 14

  GestionarSalidasLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "/aws/lambda/GestionarSalidasAlertasFunction"
      RetentionInDays: 14

  ListarInventarioLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "/aws/lambda/ListarInventarioFunction"
      RetentionInDays: 14

  # ---------------------------------------------------------------------------
  # LOGICA DE NEGOCIO: Lambda #1 - ProcesarIngresoIAFunction
  # Invoca Rekognition (DetectLabels), clasifica y guarda/suma en DynamoDB
  # ---------------------------------------------------------------------------
  ProcesarIngresoIAFunction:
    Type: AWS::Lambda::Function
    DependsOn: ProcesarIngresoLogGroup
    Properties:
      FunctionName: ProcesarIngresoIAFunction
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt LambdaInventoryExecutionRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref TablaInventarioPyME
          MIN_CONFIDENCE: "75"
      Code:
        ZipFile: |
          const { RekognitionClient, DetectLabelsCommand } = require("@aws-sdk/client-rekognition");
          const { DynamoDBClient } = require("@aws-sdk/client-dynamodb");
          const { DynamoDBDocumentClient, GetCommand, UpdateCommand } = require("@aws-sdk/lib-dynamodb");

          const rekognition = new RekognitionClient({});
          const ddbClient = new DynamoDBClient({});
          const ddb = DynamoDBDocumentClient.from(ddbClient);

          // Mapeo simple de etiquetas de Rekognition a categorias de almacenamiento
          const MAPA_CATEGORIAS = {
            Vegetable: "Refrigerador",
            Fruit: "Refrigerador",
            Meat: "Congelador",
            Seafood: "Congelador",
            Dairy: "Refrigerador",
            Beverage: "Bodega Seca",
            Bread: "Bodega Seca",
          };

          exports.handler = async (event) => {
            try {
              const body = JSON.parse(event.body || "{}");
              const { imagenBase64, cantidad } = body;

              if (!imagenBase64) {
                return respuesta(400, { error: "Falta el campo imagenBase64" });
              }

              const buffer = Buffer.from(imagenBase64, "base64");

              // 1. Analisis cognitivo con Rekognition
              const labelsResult = await rekognition.send(
                new DetectLabelsCommand({
                  Image: { Bytes: buffer },
                  MaxLabels: 5,
                  MinConfidence: Number(process.env.MIN_CONFIDENCE || 75),
                })
              );

              const labels = labelsResult.Labels || [];
              if (labels.length === 0) {
                return respuesta(422, { error: "No se pudo identificar el producto en la imagen" });
              }

              const etiquetaPrincipal = labels[0].Name;
              const confianza = labels[0].Confidence;
              const categoria = MAPA_CATEGORIAS[etiquetaPrincipal] || "Sin Clasificar";
              const productoId = etiquetaPrincipal.toLowerCase();
              const unidades = cantidad ? Number(cantidad) : 1;

              // 2. Verificar si el producto ya existe
              const existente = await ddb.send(
                new GetCommand({
                  TableName: process.env.TABLE_NAME,
                  Key: { productoId },
                })
              );

              const cantidadActual = existente.Item ? existente.Item.cantidad : 0;

              // 3. Registrar / actualizar inventario
              await ddb.send(
                new UpdateCommand({
                  TableName: process.env.TABLE_NAME,
                  Key: { productoId },
                  UpdateExpression:
                    "SET nombre = :nombre, categoria = :categoria, cantidad = :nuevaCantidad, ultimaActualizacion = :fecha, confianzaIA = :confianza",
                  ExpressionAttributeValues: {
                    ":nombre": etiquetaPrincipal,
                    ":categoria": categoria,
                    ":nuevaCantidad": cantidadActual + unidades,
                    ":fecha": new Date().toISOString(),
                    ":confianza": confianza,
                  },
                })
              );

              return respuesta(200, {
                mensaje: "Ingreso registrado correctamente",
                productoId,
                producto: etiquetaPrincipal,
                categoria,
                cantidadTotal: cantidadActual + unidades,
                confianza,
              });
            } catch (err) {
              console.error("Error en ProcesarIngresoIAFunction:", err);
              return respuesta(500, { error: "Error interno al procesar el ingreso" });
            }
          };

          function respuesta(statusCode, body) {
            return {
              statusCode,
              headers: { "Content-Type": "application/json", "Access-Control-Allow-Origin": "*" },
              body: JSON.stringify(body),
            };
          }
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  # ---------------------------------------------------------------------------
  # LOGICA DE NEGOCIO: Lambda #2 - GestionarSalidasAlertasFunction
  # Resta inventario y publica alerta en SNS si el nivel es critico
  # ---------------------------------------------------------------------------
  GestionarSalidasAlertasFunction:
    Type: AWS::Lambda::Function
    DependsOn: GestionarSalidasLogGroup
    Properties:
      FunctionName: GestionarSalidasAlertasFunction
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt LambdaInventoryExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref TablaInventarioPyME
          TOPIC_ARN: !Ref AlertasStockBajoTopic
          UMBRAL_STOCK_BAJO: !Ref StockBajoUmbral
      Code:
        ZipFile: |
          const { DynamoDBClient } = require("@aws-sdk/client-dynamodb");
          const { DynamoDBDocumentClient, GetCommand, UpdateCommand } = require("@aws-sdk/lib-dynamodb");
          const { SNSClient, PublishCommand } = require("@aws-sdk/client-sns");

          const ddbClient = new DynamoDBClient({});
          const ddb = DynamoDBDocumentClient.from(ddbClient);
          const sns = new SNSClient({});

          exports.handler = async (event) => {
            try {
              const body = JSON.parse(event.body || "{}");
              const { productoId, cantidad } = body;

              if (!productoId || !cantidad) {
                return respuesta(400, { error: "Se requieren los campos productoId y cantidad" });
              }

              const unidadesRetiradas = Number(cantidad);

              // 1. Obtener cantidad actual
              const existente = await ddb.send(
                new GetCommand({
                  TableName: process.env.TABLE_NAME,
                  Key: { productoId },
                })
              );

              if (!existente.Item) {
                return respuesta(404, { error: "Producto no encontrado en el inventario" });
              }

              const cantidadActual = existente.Item.cantidad || 0;
              const nuevaCantidad = Math.max(cantidadActual - unidadesRetiradas, 0);

              // 2. Actualizar inventario
              await ddb.send(
                new UpdateCommand({
                  TableName: process.env.TABLE_NAME,
                  Key: { productoId },
                  UpdateExpression: "SET cantidad = :nuevaCantidad, ultimaActualizacion = :fecha",
                  ExpressionAttributeValues: {
                    ":nuevaCantidad": nuevaCantidad,
                    ":fecha": new Date().toISOString(),
                  },
                })
              );

              const umbral = Number(process.env.UMBRAL_STOCK_BAJO || 5);

              // 3. Disparar alerta si el nivel es critico
              if (nuevaCantidad < umbral) {
                await sns.send(
                  new PublishCommand({
                    TopicArn: process.env.TOPIC_ARN,
                    Subject: `Alerta de Stock Bajo: ${productoId}`,
                    Message: `El producto "${productoId}" tiene ${nuevaCantidad} unidades, por debajo del umbral de ${umbral}. Favor reabastecer.`,
                  })
                );
              }

              return respuesta(200, {
                mensaje: "Salida registrada correctamente",
                producto: productoId,
                cantidadRestante: nuevaCantidad,
                alertaDisparada: nuevaCantidad < umbral,
              });
            } catch (err) {
              console.error("Error en GestionarSalidasAlertasFunction:", err);
              return respuesta(500, { error: "Error interno al procesar la salida" });
            }
          };

          function respuesta(statusCode, body) {
            return {
              statusCode,
              headers: { "Content-Type": "application/json", "Access-Control-Allow-Origin": "*" },
              body: JSON.stringify(body),
            };
          }
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  # ---------------------------------------------------------------------------
  # LOGICA DE NEGOCIO: Lambda #3 - ListarInventarioFunction
  # Consulta todos los productos almacenados en DynamoDB
  # ---------------------------------------------------------------------------
  ListarInventarioFunction:
    Type: AWS::Lambda::Function
    DependsOn: ListarInventarioLogGroup
    Properties:
      FunctionName: ListarInventarioFunction
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt LambdaInventoryExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref TablaInventarioPyME
          UMBRAL_STOCK_BAJO: !Ref StockBajoUmbral
      Code:
        ZipFile: |
          const { DynamoDBClient } = require("@aws-sdk/client-dynamodb");
          const { DynamoDBDocumentClient, ScanCommand } = require("@aws-sdk/lib-dynamodb");

          const ddbClient = new DynamoDBClient({});
          const ddb = DynamoDBDocumentClient.from(ddbClient);

          exports.handler = async () => {
            try {
              const result = await ddb.send(
                new ScanCommand({ TableName: process.env.TABLE_NAME })
              );

              const umbral = Number(process.env.UMBRAL_STOCK_BAJO || 5);
              const productos = (result.Items || [])
                .map((item) => ({
                  productoId: item.productoId,
                  nombre: item.nombre,
                  categoria: item.categoria,
                  cantidad: item.cantidad ?? 0,
                  stockBajo: (item.cantidad ?? 0) < umbral,
                  ultimaActualizacion: item.ultimaActualizacion,
                  confianzaIA: item.confianzaIA,
                }))
                .sort((a, b) => a.nombre.localeCompare(b.nombre));

              return respuesta(200, { productos, total: productos.length, umbral });
            } catch (err) {
              console.error("Error en ListarInventarioFunction:", err);
              return respuesta(500, { error: "Error interno al consultar el inventario" });
            }
          };

          function respuesta(statusCode, body) {
            return {
              statusCode,
              headers: { "Content-Type": "application/json", "Access-Control-Allow-Origin": "*" },
              body: JSON.stringify(body),
            };
          }
      Tags:
        - Key: Proyecto
          Value: !Ref ProjectName

  # ---------------------------------------------------------------------------
  # INTEGRACION: API Gateway (InventarioControlAPI) - REST API
  # ---------------------------------------------------------------------------
  InventarioControlAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: InventarioControlAPI
      Description: API REST para el sistema de control de inventario con vision artificial.
      EndpointConfiguration:
        Types:
          - REGIONAL

  # Recurso /ingreso
  IngresoResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref InventarioControlAPI
      ParentId: !GetAtt InventarioControlAPI.RootResourceId
      PathPart: ingreso

  # Recurso /salida
  SalidaResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref InventarioControlAPI
      ParentId: !GetAtt InventarioControlAPI.RootResourceId
      PathPart: salida

  # Recurso /inventario
  InventarioResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref InventarioControlAPI
      ParentId: !GetAtt InventarioControlAPI.RootResourceId
      PathPart: inventario

  # Metodo POST /ingreso -> ProcesarIngresoIAFunction
  IngresoPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref InventarioControlAPI
      ResourceId: !Ref IngresoResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations"
          - FunctionArn: !GetAtt ProcesarIngresoIAFunction.Arn

  # CORS para /ingreso
  IngresoOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref InventarioControlAPI
      ResourceId: !Ref IngresoResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: "200"
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,POST'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: "200"
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # Metodo POST /salida -> GestionarSalidasAlertasFunction
  SalidaPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref InventarioControlAPI
      ResourceId: !Ref SalidaResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations"
          - FunctionArn: !GetAtt GestionarSalidasAlertasFunction.Arn

  # CORS para /salida
  SalidaOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref InventarioControlAPI
      ResourceId: !Ref SalidaResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: "200"
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,POST'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: "200"
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # Metodo GET /inventario -> ListarInventarioFunction
  InventarioGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref InventarioControlAPI
      ResourceId: !Ref InventarioResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations"
          - FunctionArn: !GetAtt ListarInventarioFunction.Arn

  # CORS para /inventario
  InventarioOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref InventarioControlAPI
      ResourceId: !Ref InventarioResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: "200"
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,GET'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: "200"
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # Permiso para que API Gateway invoque ProcesarIngresoIAFunction
  IngresoLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcesarIngresoIAFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${InventarioControlAPI}/*/POST/ingreso"

  # Permiso para que API Gateway invoque GestionarSalidasAlertasFunction
  SalidaLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GestionarSalidasAlertasFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${InventarioControlAPI}/*/POST/salida"

  # Permiso para que API Gateway invoque ListarInventarioFunction
  InventarioLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ListarInventarioFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${InventarioControlAPI}/*/GET/inventario"

  # Deployment + Stage
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - IngresoPostMethod
      - IngresoOptionsMethod
      - SalidaPostMethod
      - SalidaOptionsMethod
      - InventarioGetMethod
      - InventarioOptionsMethod
    Properties:
      RestApiId: !Ref InventarioControlAPI
      Description: !Sub "Deploy ${AWS::StackName} v2-get-inventario"

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref InventarioControlAPI
      DeploymentId: !Ref ApiDeployment
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          MetricsEnabled: true
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 20

  # API Key + Usage Plan (capa de seguridad adicional, no descrita en el README
  # pero recomendada para no exponer el endpoint sin control de acceso)
  InventarioApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ApiStage
    Properties:
      Name: InventarioControlAPIKey
      Description: API Key para autenticar el frontend del sistema de inventario.
      Enabled: true
      StageKeys:
        - RestApiId: !Ref InventarioControlAPI
          StageName: prod

  InventarioUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiStage
    Properties:
      UsagePlanName: InventarioControlUsagePlan
      Description: Plan de uso para mantener el consumo dentro del Free Tier.
      ApiStages:
        - ApiId: !Ref InventarioControlAPI
          Stage: prod
      Throttle:
        BurstLimit: 50
        RateLimit: 20
      Quota:
        Limit: 30000
        Period: MONTH

  InventarioUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref InventarioApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref InventarioUsagePlan

