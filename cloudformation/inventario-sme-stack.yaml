    Description: ARN del rol IAM usado por las funciones Lambda del inventario.
    Value: !GetAtt LambdaInventoryExecutionRole.Arn

  StagingCsvBucketName:
    Description: Nombre del bucket S3 de staging para carga inicial CSV (ETL).
    Value: !Ref StagingCsvBucket

  StagingCsvBucketArn:
    Description: ARN del bucket S3 de staging para carga inicial CSV.
    Value: !GetAtt StagingCsvBucket.Arn

  CargaInventarioGlueJobName:
